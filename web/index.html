<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A minimalist food journal.">
  <meta name="theme-color" content="#C98A93">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS still reads the apple-prefixed flag; without it "Add to Home Screen"
       can open in a browser view instead of as a standalone app. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- "default" keeps the status bar light with dark text, matching the cream
       theme (black looked like a dark bar pinned above the app). -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Food Journal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Food Journal</title>
  <link rel="manifest" href="manifest.json">

  <!-- image_cropper web support (cropper.js) -->
  <link href="https://unpkg.com/cropperjs@1.6.1/dist/cropper.css" rel="stylesheet">
  <script src="https://unpkg.com/cropperjs@1.6.1/dist/cropper.js"></script>
  <style>
    body { background-color: #F6EEEA; margin: 0; }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; font-family: Georgia, serif; color: #6B3B42;
      font-size: 20px; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="splash">Food Journal</div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
